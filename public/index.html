<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <title>Consulta Geolocalización OSM</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <style>
    #map {
      height: 400px;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <h2>Consulta de Geolocalización — OpenStreetMap</h2>
  <fieldset>
    <legend>Origen</legend>
    Lat: <input id="oLat" value="-16.414005" />
    Lon: <input id="oLon" value="-71.515773" />
    <p id="dirOrigen"></p>
  </fieldset>
  <fieldset>
    <legend>Destino</legend>
    Lat: <input id="dLat" value="-16.406547" />
    Lon: <input id="dLon" value="-71.553179" />
    <p id="dirDestino"></p>
  </fieldset>
  <button onclick="consultar()">Consultar</button>
  <div id="map"></div>
  <p>Distancia: <span id="dist"></span> km</p>
  <p>Tiempo estimado: <span id="tiempo"></span> min</p>
  <p style="font-size:0.8em;color:#888">
    Datos © <a href="https://www.openstreetmap.org/copyright">OpenStreetMap contributors</a>
  </p>
  <script>
    // Crear mapa centrado en Arequipa
    const map = L.map('map').setView([-16.414005, -71.515773], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    const redIcon = new L.Icon({
      iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
      shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
      iconSize: [25, 41],
      iconAnchor: [12, 41],
      popupAnchor: [1, -34],
      shadowSize: [41, 41]
    });

    let markerOrigen, markerDestino, rutaLinea;

    async function consultar() {
      const [oLat, oLon, dLat, dLon] = [
        v('oLat'), v('oLon'), v('dLat'), v('dLon')
      ];

      // Geocodificación inversa
      const gO = await api(`/api/geocode?lat=${oLat}&lon=${oLon}`);
      const gD = await api(`/api/geocode?lat=${dLat}&lon=${dLon}`);

      set('dirOrigen', gO.direccion);
      set('dirDestino', gD.direccion);

      // Ruta
      const r = await api(
        `/api/ruta?oLat=${oLat}&oLon=${oLon}&dLat=${dLat}&dLon=${dLon}`
      );

      set('dist', r.distancia_km);
      set('tiempo', r.duracion_min);

      // Limpiar anteriores
      if (markerOrigen) map.removeLayer(markerOrigen);
      if (markerDestino) map.removeLayer(markerDestino);
      if (rutaLinea) map.removeLayer(rutaLinea);

      // Marcadores
      markerOrigen = L.marker([oLat, oLon], { icon: redIcon })
        .addTo(map)
        .bindPopup("Origen")
        .openPopup();

      markerDestino = L.marker([dLat, dLon], { icon: redIcon })
        .addTo(map)
        .bindPopup("Destino");

      // Ruta real entre puntos
      rutaLinea = L.geoJSON(r.geometry, {
        style: {
          color: "red",
          weight: 4,
          opacity: 0.8
        }
      }).addTo(map);

      // Ajustar zoom
      map.fitBounds(rutaLinea.getBounds());
    }

    const api = url => fetch(url).then(r => r.json());
    const v = id => document.getElementById(id).value;
    const set = (id, val) => document.getElementById(id).textContent = val;
  </script>
</body>

</html>
